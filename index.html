<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Live Subscriber Counter</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>YouTube Subscriber Counter</h1>
            <p class="subtitle">Real-time channel statistics powered by YouTube Data API v3</p>
        </header>
        
        <div class="input-section">
            <input type="text" id="channelInput" placeholder="Enter Channel ID or Username" value="">
            <button id="fetchBtn">Fetch Subscribers</button>
        </div>
        
        <div id="statusMessage" class="status"></div>
        
        <div class="counter-display" id="counterDisplay" style="display: none;">
            <div class="channel-info">
                <img id="channelAvatar" src="" alt="Channel Avatar" class="avatar">
                <div>
                    <h2 id="channelTitle"></h2>
                    <div class="live-indicator">
                        <span class="dot"></span>
                        <span id="liveStatus">Live</span>
                    </div>
                </div>
            </div>
            <div class="subscriber-count">
                <span id="subscriberCount">0</span>
                <span class="label">Subscribers</span>
            </div>
            <div class="last-updated">
                Last updated: <span id="lastUpdated"></span>
            </div>
        </div>
        
        <div class="controls" id="controls" style="display: none;">
            <button id="toggleLiveBtn">Pause Updates</button>
            <div class="interval-control">
                <label for="intervalInput">Update Interval (seconds):</label>
                <input type="number" id="intervalInput" min="5" max="60" value="10">
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
